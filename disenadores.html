<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseñadores | Animación y Arte Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #2E7D32;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            padding-bottom: 0; 
            overflow: hidden; 
            position: relative;
        }

        /* --- ZONAS DE ENCABEZADO Y PIE --- */
        .zona-superior, .zona-inferior {
            position: relative; 
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .img-fondo-zona {
            width: 100%;
            height: auto;
            display: block;
        }

        .contenido-flotante {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center; 
            justify-content: center;
            z-index: 10; 
        }

        /* --- ESTILOS DE TEXTO Y BOTONES --- */
        h1 {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
            margin-top: 10px; 
        }

        .designers-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 20px; 
            margin: 30px 0; 
        }

        .btn-disenador-img {
            width: 280px; 
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease; 
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.5)); 
        }

        .btn-disenador-img:hover {
            transform: scale(1.08); 
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.8)) drop-shadow(0px 8px 12px rgba(0,0,0,0.3)); 
        }

        .back-btn {
            background-color: #66BB6A;
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Maiden Orange', cursive;
            font-size: 1.1rem;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: background 0.3s;
            z-index: 20;
        }

        .back-btn:hover {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="zona-superior">
            <img src="imagenindexdisenador/imagenesbelmont/RectangleUP.PNG" alt="Fondo Superior" class="img-fondo-zona">
            <div class="contenido-flotante">
                <h1>DISEÑADORES</h1>
            </div>
        </div>

        <div class="designers-list">
            <a href="disenadorBelmont.html">
                <img src="imagenindexdisenador/imagenesbelmont/botonbelmont.PNG" class="btn-disenador-img" alt="Diseñador Belmont">
            </a>

            <a href="disenadordavid/pagina Bellev.HTML" id="btn-david"> 
                <img src="disenadordavid/Diseñador 2 foto.PNG" class="btn-disenador-img" alt="Diseñador David">
            </a>
        </div>

        <div class="zona-inferior">
            <img src="imagenindexdisenador/imagenesbelmont/RectangleDOWN.PNG" alt="Fondo Inferior" class="img-fondo-zona">
            <div class="contenido-flotante">
                <a href="index.html" class="back-btn">← VOLVER AL INICIO</a>
            </div>
        </div>

    </div>

    <audio id="sonido-tp" src="disenadordavid/Tp Valorant Sound Effect.M4A"></audio>

    <script>
        const btnDavid = document.getElementById('btn-david');
        const sonidoTp = document.getElementById('sonido-tp');

        btnDavid.addEventListener('click', function(event) {
            event.preventDefault(); 
            sonidoTp.currentTime = 0;
            sonidoTp.play().catch(e => console.log("Error al reproducir audio"));

            const destino = this.getAttribute('href');

            setTimeout(() => {
                window.location.href = destino;
            }, 1500);
        });
    </script>

</body>
</html>
