<!DOCTYPE html>
<html lang="es">
<head>

    <title>Belmont | Portafolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #2E7D32;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);

            padding: 20px 0;

        }

        h1 {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 2.2rem;
            margin: 0;
        }

        .profile-img {
            width: 180px;
            margin-top: 30px;
            filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.4));
        }

        .buttons-container {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-button {
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

            .nav-button:hover {
                transform: scale(1.05);
            }

        .left {
            align-self: flex-start;
        }

        .right {
            align-self: flex-end;
        }

        .back-btn {
            margin-top: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid white;
        }
    </style>
</head>

    <div class="mobile-container">

        </div>

        <img src="imagenindexdisenador/imagenesbelmont/fotobelmont.png" class="profile-img" alt="Belmont">

        <div class="buttons-container">
            <a href="acercadebelmont.html" class="left">
