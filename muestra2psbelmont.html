<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop Muestra 2 | Los 3 Hermanos</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #1B5E20;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            padding-bottom: 50px;
        }

        /* Encabezado con pico hacia abajo */
        .header-section {
            width: 100%;
            background-color: #4CAF50;
            padding: 30px 0;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 50% 100%, 0 80%);
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 2.3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .work-display-container {
            width: 90%;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
        }

        .work-img {
            width: 100%;
            display: block;
        }

        .work-description {
            width: 85%;
            text-align: center;
            padding: 10px;
            margin-bottom: 40px;
        }

            .work-description p {
                font-family: 'Maiden Orange', cursive;
                color: #ffffff;
                font-size: 1.2rem;
                line-height: 1.4;
                margin: 0;
            }

        .navigation-btn {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Maiden Orange', cursive;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
            transition: color 0.3s ease;
        }

            .navigation-btn:hover {
                color: #A5D6A7;
            }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header-section">
            <h1>MUESTRA 2</h1>
        </div>

        <div class="work-display-container">
            <img src="imagenindexdisenador/imagenesbelmont/m2psbelm.png" class="work-img" alt="Composición Photoshop Bebidas Los 3 Hermanos">
        </div>

        <div class="work-description">
            <p>
                Composición gráfica en Photoshop para la promoción de bebidas, desarrollando propuestas visuales para tres conceptos: alacrán, gusano y granada, cada uno con identidad propia.
            </p>
        </div>

        <a href="muestra1psbelmont.html" class="navigation-btn">← VOLVER A MUESTRA 1</a>
