<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop Muestra 1 | Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #F48FB1;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            padding-bottom: 50px;
        }

        .header-section {
            width: 100%;
            background-color: #F8BBD0;
            padding: 25px 0;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 2.3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dreamcore-composition {
            width: 90%;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background-color: #ffffff;
        }

        .composition-img {
            width: 100%;
            display: block;
        }

        .work-description {
            width: 85%;
            text-align: center;
            padding: 10px;
            margin-bottom: 30px;
        }

            .work-description p {
                font-family: 'Maiden Orange', cursive;
                color: #ffffff;
                font-size: 1.2rem;
                line-height: 1.4;
                margin: 0;
            }

        .next-sample-btn {
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

            .next-sample-btn:hover {
                transform: scale(1.05);
                filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
            }

        .footer-links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Maiden Orange', cursive;
            font-size: 1rem;
            border-bottom: 1px solid white;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header-section">
            <h1>MUESTRA 1</h1>
        </div>

        <div class="dreamcore-composition">
            <img src="imagenindexdisenador/imagenesbelmont/psm1belm.png" class="composition-img" alt="Composición Photoshop Dreamcore Dreams">
        </div>

        <div class="work-description">
            <p>
                Composición digital realizada en Photoshop para la promoción del disco Dreams, inspirada en la estética dreamcore, explorando elementos visuales oníricos y surrealistas.
            </p>
        </div>

        <a href="muestra2psbelmont.html">
            <img src="imagenindexdisenador/imagenesbelmont/botonm2.png" class="next-sample-btn" alt="Ver Muestra 2">
        </a>

        <div class="footer-links">
            <a href="portafoliobelmont.html" class="nav-link">VOLVER AL MENU</a>
        </div>
    </div>

</body>
</html>
