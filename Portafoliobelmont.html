<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Belmont</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #2E7D32;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            padding-bottom: 50px;
        }

        .header-section {
            width: 100%;
            background-color: #66BB6A;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 3px;
        }

        .subtitle {
            font-family: 'Maiden Orange', cursive;
            color: #ffffff;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
        }

        .portfolio-menu {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .area-link {
            text-decoration: none;
            display: block;
            width: 85%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

            .area-link:hover {
                transform: scale(1.05);
            }

        .btn-img {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        .back-btn {
            margin-top: 40px;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Maiden Orange', cursive;
            font-size: 1.2rem;
            border-bottom: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header-section">
            <h1>PORTAFOLIO</h1>
        </div>

        <p class="subtitle">¿Qué área te gustaría ver?</p>

        <div class="portfolio-menu">
            <a href="muestra1belmontmaya.html" class="area-link">

        </div>
