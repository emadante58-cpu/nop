<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Maiden+Orange&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #2F6F6B;

            flex-direction: column;
            align-items: center;

        }

        }

            color: #ffffff;
            font-size: 2.3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

            width: 90%;
            margin-bottom: 25px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border-radius: 25px;
            overflow: hidden;
            background-color: #ffffff;
        }

        .work-img {
            width: 100%;
            display: block;
        }

        .work-description {
            width: 85%;
            text-align: center;
            padding: 15px 10px;
            margin-bottom: 20px;
        }

            .work-description p {
                font-family: 'Maiden Orange', cursive;
                color: #ffffff;
                font-size: 1.2rem;
                line-height: 1.4;
                margin: 0;
            }

        /* Botón de Navegación original */
        .navigation-btn {
            margin-top: 20px;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Maiden Orange', cursive;
            font-size: 1.1rem;
            border-bottom: 2px solid white;
            transition: color 0.3s ease;
        }

            .navigation-btn:hover {
                color: #F6B26B;
            }

</head>

    <div class="mobile-container">
        <div class="header-section">
